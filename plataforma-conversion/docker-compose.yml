      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 14. MongoDB - Banco Argentina
  neo4j_banco_argentina:
    image: neo4j:5.12
    container_name: neo4j_banco_argentina
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/root1234
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474" # Interfaz Web
      - "7687:7687" # Protocolo Bolt para el script de Python
    volumes:
      - neo4j_data:/data
    networks:
      - plataforma-network

  # ============================================================
  # ASFI Central (MySQL)
  # ============================================================
  mysql_asfi_central:
    image: mysql:8.0
    container_name: mysql_asfi_central
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: asfi_central
    ports:
      - "3308:3306"
    volumes:
      - mysql_asfi_central_data:/var/lib/mysql
      - type: bind
        source: ./docker/mysql/init
        target: /docker-entrypoint-initdb.d
      - type: bind
        source: ./docker/mysql/my.cnf
        target: /etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - plataforma-network

 

networks:
  plataforma-network:
    driver: bridge

volumes:
  # Relacionales
  mysql_banco_union_data:
  postgres_banco_mercantil_data:
  oracle_banco_bisa_data:
  
  # No relacionales principales
  mongodb_banco_bnb_data:
  redis_banco_bcp_data:
  
  # MongoDB repetidos (9)
  mongodb_banco_ganadero_data:
  mongodb_banco_economico_data:
  mongodb_banco_prodem_data:
  mongodb_banco_solidario_data:
  mongodb_banco_fortaleza_data:
  mongodb_banco_fie_data:
  mongodb_banco_pyme_data:
  mongodb_banco_bdp_data:
  mongodb_banco_argentina_data:
  
  # ASFI
  mysql_asfi_central_data:

  neo4j_data:
  neo4j_logs: