version: '3.8'

services:
  # ============================================================
  # BASES RELACIONALES (3)
  # ============================================================
  
  # 1. MySQL - Banco Unión
  mysql_banco_union:
    image: mysql:8.0
    container_name: mysql_banco_union
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: banco_union
    ports:
      - "3307:3306"
    volumes:
      - mysql_banco_union_data:/var/lib/mysql
      - type: bind
        source: ./docker/mysql/init
        target: /docker-entrypoint-initdb.d
      - type: bind
        source: ./docker/mysql/my.cnf
        target: /etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - plataforma-network

  # 2. PostgreSQL - Banco Mercantil
  postgres_banco_mercantil:
    image: postgres:15
    container_name: postgres_banco_mercantil
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: root123
      POSTGRES_USER: root
      POSTGRES_DB: banco_mercantil
    ports:
      - "5433:5432"
    volumes:
      - postgres_banco_mercantil_data:/var/lib/postgresql/data
      - type: bind
        source: ./docker/postgres/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 3. Oracle XE - Banco BISA
  oracle_banco_bisa:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_banco_bisa
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: root123
      ORACLE_DATABASE: BANCO_BISA
      APP_USER: BANCO_BISA
      APP_USER_PASSWORD: root123
    ports:
      - "1521:1521"
    volumes:
      - oracle_banco_bisa_data:/opt/oracle/oradata
      - type: bind
        source: ./docker/oracle/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 4. MongoDB - Banco BNB
  mongodb_banco_bnb:
    image: mongo:7
    container_name: mongodb_banco_bnb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_bnb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_banco_bnb_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 5. Redis - Banco BCP
  redis_banco_bcp:
    image: redis:7-alpine
    container_name: redis_banco_bcp
    restart: unless-stopped
    command: redis-server --requirepass root123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_banco_bcp_data:/data
    networks:
      - plataforma-network

  # ============================================================
  # BASES REPETIDAS (9 bancos con MongoDB)
  # ============================================================
  
  # 6. MongoDB - Banco Ganadero
  mongodb_banco_ganadero:
    image: mongo:7
    container_name: mongodb_banco_ganadero
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_ganadero
    ports:
      - "27018:27017"
    volumes:
      - mongodb_banco_ganadero_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 7. MongoDB - Banco Económico
  mongodb_banco_economico:
    image: mongo:7
    container_name: mongodb_banco_economico
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_economico
    ports:
      - "27019:27017"
    volumes:
      - mongodb_banco_economico_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 8. MongoDB - Banco Prodem
  mongodb_banco_prodem:
