        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 9. MongoDB - Banco Solidario
  mongodb_banco_solidario:
    image: mongo:7
    container_name: mongodb_banco_solidario
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_solidario
    ports:
      - "27021:27017"
    volumes:
      - mongodb_banco_solidario_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 10. MongoDB - Banco Fortaleza
  mongodb_banco_fortaleza:
    image: mongo:7
    container_name: mongodb_banco_fortaleza
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_fortaleza
    ports:
      - "27022:27017"
    volumes:
      - mongodb_banco_fortaleza_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 11. MongoDB - Banco FIE
  mongodb_banco_fie:
    image: mongo:7
    container_name: mongodb_banco_fie
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_fie
    ports:
      - "27023:27017"
    volumes:
      - mongodb_banco_fie_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 12. MongoDB - Banco PYME
  mongodb_banco_pyme:
    image: mongo:7
    container_name: mongodb_banco_pyme
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_pyme
    ports:
      - "27024:27017"
    volumes:
      - mongodb_banco_pyme_data:/data/db
      - type: bind
        source: ./docker/mongodb/init
        target: /docker-entrypoint-initdb.d
    networks:
      - plataforma-network

  # 13. MongoDB - Banco Desarrollo Productivo
  mongodb_banco_bdp:
    image: mongo:7
    container_name: mongodb_banco_bdp
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: banco_bdp
    ports:
