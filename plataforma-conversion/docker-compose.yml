version: "3.9"

services:
  mysql_banco_union:
    image: mysql:8.0
    container_name: mysql_banco_union
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_banco_union_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password

  bank_service:
    build: .
    container_name: bank_service
    restart: unless-stopped
    depends_on:
      - mysql_banco_union
    ports:
      - "8081:8081"
    env_file:
      - .env
    command: uvicorn apps.bank_service.app.main:app --host 0.0.0.0 --port 8081 --reload
    volumes:
      - ./:/app
    working_dir: /app

volumes:
  mysql_banco_union_data: